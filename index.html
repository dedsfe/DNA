<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DNA</title>
    <link rel="stylesheet" href="./styles.css?v=17" />
  </head>
  <body>
    <main class="page">
      <header class="hero" aria-label="Apresentação da empresa DNA">
        <img
          class="hero__image"
          src="./assets/hero-clouds.png"
          alt=""
          aria-hidden="true"
        />
        <img
          class="hero__image hero__image--bottom"
          src="./assets/hero-clouds-bottom.png"
          alt=""
          aria-hidden="true"
        />

        <nav class="hero__nav" aria-label="Navegação principal">
          <div class="hero__nav-shell">
            <span class="hero__nav-orbit" aria-hidden="true">
              <span class="hero__nav-orbit-light"></span>
            </span>
            <div class="hero__nav-brand" aria-label="DNA">
              <span class="hero__nav-brand-mark">
                <img src="./assets/dna-brand.png" alt="" />
              </span>
            </div>
            <p class="hero__nav-label" aria-hidden="true">
              Clareza, presença e consistência
            </p>
            <button class="hero__nav-cta" type="button">
              Entrar em contato
            </button>
          </div>
        </nav>

        <div class="hero__content">
          <p class="hero__watermark" aria-hidden="true">DNA</p>

          <div class="hero__stage">
            <h1 class="hero__headline">
              Sites, branding e direção visual bem resolvidos.
            </h1>
            <p class="hero__subhead">
              Clareza e presença para sua marca parecer profissional.
            </p>
          </div>

          <p
            class="hero__bottom-note"
            aria-label="Desça para conhecer nossos projetos"
          >
            <span class="hero__bottom-note-prefix" aria-hidden="true">
              Desça para conhecer nossos
            </span>
            <span
              class="hero__bottom-note-word"
              data-words="projetos|casos|sites|portfólio|trabalhos"
              aria-hidden="true"
            >projetos</span>
          </p>
        </div>
      </header>

      <section
        class="support-panel"
        aria-label="Base da próxima seção"
      ></section>
    </main>
    <script src="./script.js?v=14"></script>
  </body>
</html>
