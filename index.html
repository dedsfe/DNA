<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DNA</title>
    <link rel="stylesheet" href="./styles.css?v=16" />
  </head>
  <body>
    <main class="page">
      <header class="hero" aria-label="Apresentação da empresa DNA">
        <img
          class="hero__image"
          src="./assets/hero-clouds.png"
          alt=""
          aria-hidden="true"
        />
        <img
          class="hero__image hero__image--bottom"
          src="./assets/hero-clouds-bottom.png"
          alt=""
          aria-hidden="true"
        />

        <nav class="hero__nav" aria-label="Navegação principal">
          <div class="hero__nav-shell">
            <div class="hero__nav-brand" aria-label="DNA">
              <span class="hero__nav-brand-mark">
                <img src="./assets/dna-brand.png" alt="" />
              </span>
            </div>
            <p class="hero__nav-label" aria-hidden="true">
              <span class="hero__nav-label-prefix">Seja bem-vindo à agência</span>
              <span
                class="hero__nav-label-word"
                data-words="criativa|visual|digital|de branding|autoral|estratégica"
              >criativa</span>
            </p>
            <button class="hero__nav-cta" type="button">
              Entrar em contato
            </button>
          </div>
        </nav>

        <div class="hero__content">
          <h1 class="sr-only">DNA</h1>
          <div class="hero__marquee" aria-hidden="true">
            <div class="hero__marquee-track">
              <div class="hero__marquee-group">
                <span class="hero__word">DNA</span>
                <span class="hero__mark">
                  <img src="./assets/dna-brand.png" alt="" />
                </span>
                <span class="hero__word">DNA</span>
                <span class="hero__mark">
                  <img src="./assets/dna-brand.png" alt="" />
                </span>
                <span class="hero__word">DNA</span>
                <span class="hero__mark">
                  <img src="./assets/dna-brand.png" alt="" />
                </span>
              </div>

              <div class="hero__marquee-group">
                <span class="hero__word">DNA</span>
                <span class="hero__mark">
                  <img src="./assets/dna-brand.png" alt="" />
                </span>
                <span class="hero__word">DNA</span>
                <span class="hero__mark">
                  <img src="./assets/dna-brand.png" alt="" />
                </span>
                <span class="hero__word">DNA</span>
                <span class="hero__mark">
                  <img src="./assets/dna-brand.png" alt="" />
                </span>
              </div>
            </div>
          </div>

          <p
            class="hero__bottom-note"
            aria-label="Desça para conhecer nossos projetos"
          >
            <span class="hero__bottom-note-prefix" aria-hidden="true">
              Desça para conhecer nossos
            </span>
            <span
              class="hero__bottom-note-word"
              data-words="projetos|casos|trabalhos|sites|estudos"
              aria-hidden="true"
            >projetos</span>
          </p>
        </div>
      </header>

      <section
        class="support-panel"
        aria-label="Base da próxima seção"
      ></section>
    </main>
    <script src="./script.js?v=13"></script>
  </body>
</html>
